<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Demo Company - Best Clothing Store</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="stylesheet" href="style.css" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
  />
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="typescript,react">
    type Category = "Men" | "Women";

    type Product = {
      id: number;
      name: string;
      price: number;
      image: string;
      category: Category;
    };

    type NavbarProps = {
      searchTerm: string;
      cartCount: number;
      onSearchChange: (value: string) => void;
    };

    type ProductCardProps = {
      product: Product;
      onAddToCart: (product: Product) => void;
    };

    const products: Product[] = [
      {
        id: 1,
        name: "Men's Blue Shirt",
        price: 799,
        image:
          "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=400&h=500&fit=crop",
        category: "Men",
      },
      {
        id: 2,
        name: "Women's Red Dress",
        price: 1299,
        image:
          "https://images.unsplash.com/photo-1496747611176-843222e1e57c?w=400&h=500&fit=crop",
        category: "Women",
      },
      {
        id: 3,
        name: "Black Jeans",
        price: 999,
        image:
          "https://images.unsplash.com/photo-1542272604-787c3835535d?w=400&h=500&fit=crop",
        category: "Men",
      },
      {
        id: 4,
        name: "White T-Shirt",
        price: 399,
        image:
          "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=400&h=500&fit=crop",
        category: "Men",
      },
      {
        id: 5,
        name: "Floral Top",
        price: 599,
        image:
          "https://images.unsplash.com/photo-1483985988355-763728e1935b?w=400&h=500&fit=crop",
        category: "Women",
      },
      {
        id: 6,
        name: "Denim Jacket",
        price: 1499,
        image:
          "https://images.unsplash.com/photo-1541099649105-f69ad21f3246?w=400&h=500&fit=crop",
        category: "Men",
      },
    ];

    function Navbar({
      searchTerm,
      cartCount,
      onSearchChange,
    }: NavbarProps) {
      return (
        <nav className="navbar">
          <div className="nav-container">
            <div className="logo">
              <h2>The Demo Company</h2>
            </div>

            <div className="nav-links">
              <a href="#home" className="nav-link">Home</a>
              <a href="#products" className="nav-link">Products</a>
              <a href="#category" className="nav-link">Category</a>
              <a href="#about" className="nav-link">About Us</a>
              <a href="#contact" className="nav-link">Contact Us</a>
            </div>

            <div className="nav-right">
              <div className="search-box">
                <input
                  type="text"
                  placeholder="Search products..."
                  value={searchTerm}
                  onChange={(event: React.ChangeEvent<HTMLInputElement>) =>
                    onSearchChange(event.target.value)
                  }
                />
                <i className="fas fa-search"></i>
              </div>

              <div className="cart-icon">
                <i className="fas fa-shopping-cart"></i>
                <span className="cart-count">{cartCount}</span>
              </div>
            </div>
          </div>
        </nav>
      );
    }

    function ProductCard({ product, onAddToCart }: ProductCardProps) {
      return (
        <div className="product-card">
          <img src={product.image} alt={product.name} />

          <div className="product-info">
            <h3>{product.name}</h3>
            <p className="price">₹{product.price}</p>
            <button
              className="add-to-cart-btn"
              onClick={() => onAddToCart(product)}
            >
              Add to Cart
            </button>
          </div>
        </div>
      );
    }

    function App() {
      const [cartItems, setCartItems] = React.useState<Product[]>([]);
      const [searchTerm, setSearchTerm] = React.useState<string>("");

      // Keep filtering local since the product list is small.
      const filteredProducts = products.filter((product) => {
        const query = searchTerm.trim().toLowerCase();

        if (!query) {
          return true;
        }

        return (
          product.name.toLowerCase().includes(query) ||
          product.category.toLowerCase().includes(query)
        );
      });

      const addToCart = (product: Product) => {
        setCartItems((currentItems) => [...currentItems, product]);
        window.alert(product.name + " added to cart!");
      };

      const scrollToSection = (sectionId: string) => {
        const section = document.getElementById(sectionId);

        if (section) {
          section.scrollIntoView({ behavior: "smooth" });
        }
      };

      return (
        <div className="App">
          <Navbar
            searchTerm={searchTerm}
            cartCount={cartItems.length}
            onSearchChange={setSearchTerm}
          />

          <section id="home" className="hero">
            <div className="hero-content">
              <h1>Welcome to The Demo Company</h1>
              <p>Best quality clothing at affordable prices</p>
              <button
                className="cta-btn"
                onClick={() => scrollToSection("products")}
              >
                Shop Now
              </button>
            </div>
          </section>

          <section id="products" className="products-section">
            <div className="container">
              <h2>Our Products</h2>

              <div className="products-grid">
                {filteredProducts.map((product) => (
                  <ProductCard
                    key={product.id}
                    product={product}
                    onAddToCart={addToCart}
                  />
                ))}
              </div>
            </div>
          </section>

          <section id="category" className="category-section">
            <div className="container">
              <h2>Shop by Category</h2>

              <div className="category-grid">
                <div className="category-card">
                  <i className="fas fa-male"></i>
                  <h3>Men</h3>
                </div>

                <div className="category-card">
                  <i className="fas fa-female"></i>
                  <h3>Women</h3>
                </div>
              </div>
            </div>
          </section>

          <section id="about" className="about-section">
            <div className="container">
              <h2>About Us</h2>
              <p>
                We are The Demo Company, providing high quality clothing for
                everyone. Our mission is to make fashion accessible to all.
              </p>
            </div>
          </section>

          <section id="contact" className="contact-section">
            <div className="container">
              <h2>Contact Us</h2>
              <p>Email: demo@company.com | Phone: 99876543210</p>
            </div>
          </section>

          <footer className="footer">
            <p>&copy; 2026 The Demo Company.</p>
          </footer>
        </div>
      );
    }

    const rootElement = document.getElementById("root");

    if (rootElement) {
      const root = ReactDOM.createRoot(rootElement);
      root.render(<App />);
    }
  </script>
</body>
</html>
