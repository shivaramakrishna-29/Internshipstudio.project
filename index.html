        // Navbar Component
        function Navbar() {
            const [searchTerm, setSearchTerm] = useState('');
            const [cartCount, setCartCount] = useState(0);

            return (
                <nav className="navbar">
                    <div className="nav-container">
                        <div className="logo">
                            <h2>The Demo Company</h2>
                        </div>
                        <div className="nav-links">
                            <a href="#home" className="nav-link">Home</a>
                            <a href="#products" className="nav-link">Products</a>
                            <a href="#category" className="nav-link">Category</a>
                            <a href="#about" className="nav-link">About Us</a>
                            <a href="#contact" className="nav-link">Contact Us</a>
                        </div>
                        <div className="nav-right">
                            <div className="search-box">
                                <input 
                                    type="text" 
                                    placeholder="Search products..." 
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                />
                                <i className="fas fa-search"></i>
                            </div>
                            <div className="cart-icon">
                                <i className="fas fa-shopping-cart"></i>
                                <span className="cart-count">{cartCount}</span>
                            </div>
                        </div>
                    </div>
                </nav>
            );
        }

        // Product Card Component
        function ProductCard({ product, onAddToCart }) {
            return (
                <div className="product-card">
                    <img src={product.image} alt={product.name} />
                    <div className="product-info">
                        <h3>{product.name}</h3>
                        <p className="price">₹{product.price}</p>
                        <button 
                            className="add-to-cart-btn"
                            onClick={() => onAddToCart(product)}
                        >
                            Add to Cart
                        </button>
                    </div>
                </div>
            );
        }

        // Main App Component
        function App() {
            const [cartItems, setCartItems] = useState([]);
            const [activeSection, setActiveSection] = useState('home');
            const [filteredProducts, setFilteredProducts] = useState(products);

            const addToCart = (product) => {
                setCartItems([...cartItems, product]);
                alert(`${product.name} added to cart!`);
            };

            const scrollToSection = (section) => {
                setActiveSection(section);
                document.getElementById(section).scrollIntoView({ behavior: 'smooth' });
            };

            return (
                <div className="App">
                    <Navbar />
                    
                    {/* Hero Section */}
                    <section id="home" className="hero">
                        <div className="hero-content">
                            <h1>Welcome to The Demo Company</h1>
                            <p>Best quality clothing at affordable prices</p>
                            <button className="cta-btn" onClick={() => scrollToSection('products')}>
                                Shop Now
                            </button>
                        </div>
                    </section>

                    {/* Products Section */}
                    <section id="products" className="products-section">
                        <div className="container">
                            <h2>Our Products</h2>
                            <div className="products-grid">
                                {products.map(product => (
                                    <ProductCard 
                                        key={product.id}
                                        product={product}
                                        onAddToCart={addToCart}
                                    />
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Category Section */}
                    <section id="category" className="category-section">
                        <div className="container">
                            <h2>Shop by Category</h2>
                            <div className="category-grid">
                                <div className="category-card">
                                    <i className="fas fa-male"></i>
                                    <h3>Men</h3>
                                </div>
                                <div className="category-card">
                                    <i className="fas fa-female"></i>
                                    <h3>Women</h3>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* About Section */}
                    <section id="about" className="about-section">
                        <div className="container">
                            <h2>About Us</h2>
                            <p>We are The Demo Company, providing high quality clothing for everyone. 
                               Our mission is to make fashion accessible to all.</p>
                        </div>
                    </section>

                    {/* Contact Section */}
                    <section id="contact" className="contact-section">
                        <div className="container">
                            <h2>Contact Us</h2>
                            <p>Email: demo@company.com | Phone: 99876543210</p>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="footer">
                        <p>&copy; 2026 The Demo Company.</p>
                    </footer>
                </div>
            );
        }

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
